name: CI

on:
  pull_request:
  merge_group:

jobs:
  check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run format:check

      - run: npm run codegen:paraglide

      - run: npm run lint

      - run: npm run typecheck
